<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>StickyPad</title>
</head>
<body>
    <div class="toolbar">
        <span class="toolbar-label">Color:</span>
        <button class="color-btn amarillo" data-color="#fff9b1"></button>
        <button class="color-btn rosa" data-color="#ffb3ba"></button>
        <button class="color-btn verde" data-color="#baffc9"></button>
        <button class="color-btn azul" data-color="#bae1ff"></button>
        <button class="color-btn naranja" data-color="#ffdfba"></button>
    </div>

    <div id="notes-grid" class="notes-grid"></div>

    <button id="add-btn" class="add-btn">+</button>

    <script src="app.js"></script>
</body>
</html>
